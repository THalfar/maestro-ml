# =============================================================================
# LightGBM Configuration — maestro-ml
# =============================================================================
# Microsoft's gradient boosting with leaf-wise growth. Fast training,
# low memory usage. GPU build requires special installation.
# =============================================================================

name: LightGBM
class_path:
  binary_classification: lightgbm.LGBMClassifier
  regression: lightgbm.LGBMRegressor
task_types:
  - binary_classification
  - regression

gpu:
  supported: true
  params:
    device: gpu
  fallback:
    device: cpu
  install_notes: >
    Default pip/conda installs are CPU-only. For GPU support, build from
    source with -DUSE_GPU=1 or install via conda-forge with GPU variant.
    Requires OpenCL or CUDA depending on build configuration.

hyperparameters:
  num_leaves:
    type: int
    low: 16
    high: 255
  learning_rate:
    type: float
    low: 0.005
    high: 0.3
    log: true
  n_estimators:
    type: int
    low: 300
    high: 3000
  reg_lambda:
    type: float
    low: 1.0e-8
    high: 10.0
    log: true
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  min_child_samples:
    type: int
    low: 5
    high: 100

fixed_params:
  verbosity: -1
  random_state: 42

training:
  early_stopping: true
  early_stopping_param: early_stopping_rounds       # LightGBM uses callbacks
  early_stopping_rounds: 50
  eval_metric_param: metric
  eval_metric:
    binary_classification: binary_logloss
    regression: rmse
  needs_eval_set: true

feature_requirements:
  needs_scaling: false
  handles_categorical: true   # Via categorical_feature parameter
  handles_missing: true

optuna:
  n_trials: 200
  qmc_warmup_ratio: 0.3
  timeout: null
  pruner:
    type: median
    n_warmup_steps: 3
    n_startup_trials: 10
  n_top_trials: 5
  n_seeds: 3
