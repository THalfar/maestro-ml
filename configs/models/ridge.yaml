# =============================================================================
# Ridge (Logistic/Linear Regression) Configuration — maestro-ml
# =============================================================================
# Fast linear baseline. Uses LogisticRegression for classification
# (which has a C parameter = inverse regularization strength) and
# Ridge for regression. Provides a strong baseline for ensemble diversity.
# =============================================================================

name: Ridge
class_path:
  binary_classification: sklearn.linear_model.LogisticRegression
  regression: sklearn.linear_model.Ridge
task_types:
  - binary_classification
  - regression

gpu:
  supported: false
  params: {}
  fallback: {}
  install_notes: CPU-only sklearn model.

hyperparameters:
  C:
    type: float
    low: 0.001
    high: 100.0
    log: true

fixed_params:
  binary_classification:
    max_iter: 2000
    solver: lbfgs
    random_state: 42
  regression:
    max_iter: 2000

training:
  early_stopping: false
  early_stopping_param: null
  early_stopping_rounds: null
  eval_metric_param: null
  needs_eval_set: false

feature_requirements:
  needs_scaling: true
  handles_categorical: false
  handles_missing: false

optuna:
  n_trials: 50
  qmc_warmup_ratio: 0.3
  timeout: null
  pruner:
    type: none
  n_top_trials: 1
  n_seeds: 1
