# =============================================================================
# Extra Trees Configuration — maestro-ml
# =============================================================================
# Extremely Randomized Trees. Higher variance than Random Forest due to
# random split thresholds. This variance is USEFUL for ensemble diversity:
# Extra Trees predictions correlate less with gradient boosting models,
# increasing effective ensemble size.
# =============================================================================

name: Extra Trees
class_path:
  binary_classification: sklearn.ensemble.ExtraTreesClassifier
  regression: sklearn.ensemble.ExtraTreesRegressor
task_types:
  - binary_classification
  - regression

gpu:
  supported: false
  params: {}
  fallback: {}
  install_notes: CPU-only sklearn model.

hyperparameters:
  n_estimators:
    type: int
    low: 100
    high: 300                                  # 1000 too slow on 630K×10-fold
  max_depth:
    type: int
    low: 5
    high: 15                                   # deep trees on 567K rows = slow + overfit
  min_samples_leaf:
    type: int
    low: 2
    high: 50
  max_features:
    type: categorical
    choices: [sqrt, log2, 0.5, 0.7]            # 1.0 = no subsampling

fixed_params:
  n_jobs: -1
  random_state: 42

training:
  early_stopping: false
  early_stopping_param: null
  early_stopping_rounds: null
  uses_callbacks_for_early_stopping: false
  seed_param: random_state
  eval_metric_param: null
  needs_eval_set: false
  supports_sample_weight: true

feature_requirements:
  needs_scaling: false
  handles_categorical: false
  handles_missing: false

optuna:
  n_trials: 15                                 # diversity model — fewer trials sufficient
  qmc_warmup_trials: 5
  timeout: null
  pruner:
    type: none
  n_top_trials: 1                              # retrain only best (1×1×10 = 10 fits)
  n_seeds: 1                                   # ET is already stochastic via random splits
