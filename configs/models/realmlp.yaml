# =============================================================================
# RealMLP (Tuned Defaults) Configuration — maestro-ml
# =============================================================================
# Modern MLP optimized for tabular data via pytabkit. Significantly stronger
# than sklearn's MLPClassifier thanks to tuned architecture defaults, proper
# initialization, and built-in preprocessing. Handles scaling and categorical
# features internally. Uses PyTorch under the hood with GPU auto-detection.
#
# Uses per-fold selection (selection_mode: per_fold) — during Optuna, each
# fold's model also predicts on test data. The top N predictions per fold
# are kept (including from pruned trials), then assembled into composite
# arrays. This maximizes neural network stochasticity and eliminates
# retraining after Optuna.
# =============================================================================

name: RealMLP
class_path:
  binary_classification: pytabkit.RealMLP_TD_Classifier
  regression: pytabkit.RealMLP_TD_Regressor
task_types:
  - binary_classification
  - regression

gpu:
  supported: true
  params:
    device: cuda
  fallback:
    device: cpu
  install_notes: >
    Requires PyTorch with CUDA support. pytabkit auto-detects GPU.
    Install: pip install pytabkit torch --index-url https://download.pytorch.org/whl/cu121

# ---------------------------------------------------------------------------
# Hyperparameters — Optuna search space
# ---------------------------------------------------------------------------
# Expanded based on competition results. Uses rectangular architecture
# (fixed hidden_sizes: "rectangular" in fixed_params) with searchable
# n_hidden_layers and hidden_width instead of dynamic_int_list.
# ---------------------------------------------------------------------------
hyperparameters:
  # --- Architecture ---
  n_hidden_layers:
    type: int
    low: 1
    high: 8
  hidden_width:
    type: int
    low: 32
    high: 512
  act:
    type: categorical
    choices: [relu, selu, mish]

  # --- Learning rate & schedule ---
  lr:
    type: float
    low: 0.0001
    high: 0.1
    log: true
  first_layer_lr_factor:
    type: float
    low: 0.01
    high: 1.0
    log: true
  scale_lr_factor:
    type: float
    low: 0.1
    high: 10.0
    log: true

  # --- Regularization ---
  batch_size:
    type: int
    low: 1024
    high: 8192
    log: true
    
  p_drop:
    type: float
    low: 0.0
    high: 0.5
  p_drop_sched:
    type: categorical
    choices: [flat_cos, cos, flat]
  wd:
    type: float
    low: 0.000001
    high: 0.1
    log: true
  ls_eps:
    type: float
    low: 0.0
    high: 0.2
  ls_eps_sched:
    type: categorical
    choices: [coslog4, cos, flat]
  sq_mom:
    type: float
    low: 0.9
    high: 0.9999
    log: true

  # --- Embeddings (PLR = Periodic Linear Representation) ---
  embedding_size:
    type: int
    low: 2
    high: 32
  plr_sigma:
    type: float
    low: 0.01
    high: 5.0
    log: true
  plr_lr_factor:
    type: float
    low: 0.01
    high: 1.0
    log: true
  plr_hidden_1:
    type: int
    low: 4
    high: 64
  plr_hidden_2:
    type: int
    low: 1
    high: 32
  max_one_hot_cat_size:
    type: int
    low: 0
    high: 50

  # --- Ensemble ---
  n_ens:
    type: int
    low: 1
    high: 3

# ---------------------------------------------------------------------------
# Fixed params — task-type keyed
# ---------------------------------------------------------------------------
# "rectangular" hidden_sizes means all hidden layers have the same width,
# controlled by n_hidden_layers and hidden_width from the search space.
# n_ens (pytabkit internal ensemble count) is in the Optuna search space.
# ---------------------------------------------------------------------------
fixed_params:
  binary_classification:
    hidden_sizes: rectangular
    n_epochs: 100
    n_cv: 1
    n_refit: 0
    use_early_stopping: true
    early_stopping_additive_patience: 3
    early_stopping_multiplicative_patience: 1
    val_metric_name: 1-auc_ovr
    verbosity: 0
    random_state: 42
  regression:
    hidden_sizes: rectangular
    n_epochs: 100
    n_cv: 1
    n_refit: 0
    use_early_stopping: true
    early_stopping_additive_patience: 3
    early_stopping_multiplicative_patience: 1
    val_metric_name: rmse
    verbosity: 0
    random_state: 42

training:
  early_stopping: false                          # RealMLP handles early stopping internally
  early_stopping_param: null
  early_stopping_rounds: null
  uses_callbacks_for_early_stopping: false
  seed_param: random_state
  eval_metric_param: null
  needs_eval_set: false
  supports_sample_weight: false

feature_requirements:
  needs_scaling: false                           # RealMLP preprocesses internally
  handles_categorical: true                      # auto-detects from DataFrame dtype
  handles_missing: false

optuna:
  n_trials: 1000                                 # GPU-accelerated, can afford more trials
  qmc_warmup_trials: 10
  timeout: null
  pruner:
    type: median                                 # prune bad trials after a few folds
    n_warmup_steps: 1                            # evaluate at least 2 folds before pruning
    n_startup_trials: 10
  n_top_trials: 20
  n_seeds: 1
  selection_mode: per_fold                       # per-fold best selection (no retraining)
  fold_timeout: 180
  assembly:
    mode: nsga2                                  # "rank" (deterministic) | "nsga2" (diversity-optimized)
    n_composites: 10                             # how many composites from Pareto front
    n_generations: 100                           # NSGA-II generations (each eval = array lookup, <1s total)
    pop_size: 150                                # NSGA-II population size
    diversity_metric: ambiguity                  # pearson_neff | spearman_neff | ambiguity
    diversity_weight: 0.3                        # 0=pure score, 1=pure diversity (Pareto front selection)
  # --- Tracker diversity mode (optional, default: vanilla) ---
  # "tiered" uses two-tier insertion: tier-1 = score-protected anchors,
  # tier-2 = diversity-aware cluster-best. Prevents NSGA-II assembly from
  # seeing 20 near-identical predictions on low-signal data.
  # Disabled by default — enable via strategy YAML per competition.
  # tracker:
  #   diversity_mode: tiered
  #   tier1_size: 5                              # top-5 by score always protected
  #   tier2_corr_threshold: 0.99                 # |corr| >= 0.99 = same cluster
  # --- Diversity pruning (optional, disabled by default) ---
  # Prunes redundant trials (highly correlated with tracker) to save compute.
  # Especially useful for low-signal data (e.g., Porto Seguro, max corr=0.054)
  # where all trials produce AUC ± 0.003 but identical predictions.
  # diversity_pruning:
  #   corr_threshold: 0.995                      # |corr| >= 0.995 = redundant
  #   warmup_entries: 5                          # wait for 5 entries before pruning
  #   n_consecutive: 2                           # 2 consecutive redundant folds → prune
  #   score_tolerance: 0.001                     # never prune new best score
