# =============================================================================
# Random Forest Configuration — maestro-ml
# =============================================================================
# Bagging-based ensemble. Lower variance than Extra Trees.
# Useful for ensemble diversity — fundamentally different from
# gradient boosting models. Can be used with fixed configs
# (no Optuna) for fast diversity injection.
# =============================================================================

name: Random Forest
class_path:
  binary_classification: sklearn.ensemble.RandomForestClassifier
  regression: sklearn.ensemble.RandomForestRegressor
task_types:
  - binary_classification
  - regression

gpu:
  supported: false
  params: {}
  fallback: {}
  install_notes: CPU-only sklearn model.

hyperparameters:
  n_estimators:
    type: int
    low: 100
    high: 300                                  # 1000 too slow on 630K×10-fold (~19min/trial)
  max_depth:
    type: int
    low: 5
    high: 15                                   # deep trees on 567K rows = slow + overfit
  min_samples_leaf:
    type: int
    low: 2
    high: 50
  max_features:
    type: categorical
    choices: [sqrt, log2, 0.5, 0.7]            # 1.0 = no subsampling, defeats bagging

fixed_params:
  n_jobs: -1
  random_state: 42

training:
  early_stopping: false
  early_stopping_param: null
  early_stopping_rounds: null
  uses_callbacks_for_early_stopping: false
  seed_param: random_state
  eval_metric_param: null
  needs_eval_set: false

feature_requirements:
  needs_scaling: false
  handles_categorical: false
  handles_missing: false

optuna:
  n_trials: 15                                 # diversity model — fewer trials sufficient
  qmc_warmup_ratio: 0.3
  timeout: null
  pruner:
    type: none
  n_top_trials: 1                              # retrain only best (1×1×10 = 10 fits)
  n_seeds: 1                                   # RF is already stochastic via bootstrap
