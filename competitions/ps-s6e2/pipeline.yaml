# =============================================================================
# Kaggle Playground Series S6E2 — Heart Disease Prediction
# =============================================================================
# Binary classification: predict HeartDisease (Presence/Absence → 1/0)
# Features: Age, Sex, Chest pain type, BP, Cholesterol, FBS over 120,
#   EKG results, Max HR, Exercise angina, ST depression, Slope of ST,
#   Number of vessels fluro, Thallium
# =============================================================================

data:
  train_path: "data/ps-s6e2/train.csv"
  test_path: "data/ps-s6e2/test.csv"
  target_column: "Heart Disease"
  id_column: "id"
  task_type: "binary_classification"
  target_mapping:
    Presence: 1
    Absence: 0

cv:
  n_folds: 5
  seed: 42
  stratified: true

strategy:
  mode: "manual"
  api:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250514"
    env_key: "ANTHROPIC_API_KEY"
    max_tokens: 4096
  manual:
    eda_output_path: "competitions/ps-s6e2/results/eda_report.txt"
    strategy_input_path: "competitions/ps-s6e2/strategy_output.yaml"

models:
  - realmlp
  - catboost
  - xgboost
  - ridge
  - elastic_net
  - knn  
  - gaussian_nb
  - adaboost
  
  

features:
  interactions: []
  ratios: []
  target_encoding:
    columns: []
    pairs: []
    alpha: 15
  custom: []

ensemble:
  strategy: "nsga2"
  nsga2_trials: 15000
  diversity_weight: 0.3
  

optuna:
  global_seed: 42
  global_timeout: null
  model_timeouts:          # 8h ajo — RTX 5090 (~7h30m Optuna + 30min ensemble/retrain)
    realmlp: "5h"       # GPU neural net — nopein GPU-malli, eniten hyötyä ajasta
    catboost: "1h30m"         # GPU boosting — paras single model, pidetään täytenä
    xgboost: "1h30m"          # GPU boosting — vähennetty 15min CB:n hyväksi
    adaboost: "20m"        # hidas sklearn — riittää konvergenssiin
    ridge: "8m"            # lineaarinen, konvergoi nopeasti
    elastic_net: "8m"      # lineaarinen
    knn: "8m"              # distance calc
    gaussian_nb: "4m"      # triviaali, <50 trialia riittää

runtime:
  gpu_check: true
  gpu_fallback: true
  n_jobs: -1
  verbose: 2

output:
  submission_path: "competitions/ps-s6e2/results/submission.csv"
  results_dir: "competitions/ps-s6e2/results/"
  save_oof: true
