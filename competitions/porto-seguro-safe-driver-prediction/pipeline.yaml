# =============================================================================
# Porto Seguro Safe Driver Prediction — 16h GPU Run (RTX 5090)
# =============================================================================
# Binary classification: predict probability of insurance claim (target 0/1)
# Metric: Normalized Gini Coefficient (= 2*AUC - 1, so optimize AUC)
# Data: ~595k train, ~893k test, 57 features (anonymized)
# Feature naming: ps_ind_* (individual), ps_reg_* (registration),
#   ps_car_* (car), ps_calc_* (calculated — noise, dropped)
# Suffixes: _bin (binary), _cat (categorical), no suffix (continuous/ordinal)
# Missing values encoded as -1 in categorical features
# Highly imbalanced: ~3.6% positive class
#
# Model selection: 5 models — 3 GBM + 2 neural nets for structural diversity.
# - CatBoost: GPU with Logloss eval (AUC unsupported on GPU) — different
#   optimization signal, symmetric tree growth
# - XGBoost: GPU with AUC eval — direct metric optimization, level-wise growth
# - LightGBM: leaf-wise growth — fundamentally different tree structure from
#   CatBoost/XGBoost, finds different optima. Fast even on CPU.
# - RealMLP: neural net, per-fold NSGA-II assembly
# - TabM: parameter-efficient ensemble NN, per-fold NSGA-II assembly
#
# 16h budget allocation:
# - RealMLP 6h: 1h substudy (10% data, QMC) + 5h main TPE (per-fold NSGA-II)
# - TabM 6h: 1h substudy (10% data, QMC) + 5h main TPE (per-fold NSGA-II)
# - CatBoost 1h20m: GPU, symmetric growth, Logloss metric
# - XGBoost 1h20m: GPU, level-wise growth, AUC metric
# - LightGBM 1h20m: CPU/GPU, leaf-wise growth — fast per trial
# =============================================================================

data:
  train_path: "competitions/porto-seguro-safe-driver-prediction/train.csv"
  test_path: "competitions/porto-seguro-safe-driver-prediction/test.csv"
  target_column: "target"
  id_column: "id"
  task_type: "binary_classification"

cv:
  n_folds: 10
  seed: 42
  stratified: true

strategy:
  mode: "manual"
  api:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250514"
    env_key: "ANTHROPIC_API_KEY"
    max_tokens: 4096
  manual:
    eda_output_path: "competitions/porto-seguro-safe-driver-prediction/results/eda_report.txt"
    strategy_input_path: "competitions/porto-seguro-safe-driver-prediction/strategy_output.yaml"

models:
  - realmlp
  - tabm
  - catboost
  - xgboost
  - lightgbm
  

features:
  interactions: []
  ratios: []
  target_encoding:
    columns: []
    pairs: []
    alpha: 15
  custom: []

ensemble:
  strategy: "nsga2"
  nsga2_trials: 10000
  diversity_weight: 0.3   
  diversity_metric: "spearman_neff" 
  meta_models: ["logreg", "xgboost"]
  meta_cv_folds: 15
  meta_trials:
    logreg: 150
    xgboost: 200

optuna:
  global_seed: 42
  global_timeout: null
  model_timeouts:
    catboost: "2h"
    xgboost: "2h"
    lightgbm: "3h"
    realmlp: "6h"              # 1h substudy + 5h main TPE
    tabm: "6h"                 # 1h substudy + 5h main TPE

runtime:
  gpu_check: true
  gpu_fallback: true
  n_jobs: -1
  verbose: 2

output:
  submission_path: "competitions/porto-seguro-safe-driver-prediction/results/submission.csv"
  results_dir: "competitions/porto-seguro-safe-driver-prediction/results/"
  save_oof: true
